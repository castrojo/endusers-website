name: CI
on: [pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: cd endusers-go && go test ./...
      - run: cd endusers-go && go build -o endusers cmd/endusers/main.go && cd .. && ./endusers-go/endusers
      - run: npm ci
      - run: npx vitest run
      - name: Build
        run: |
          mkdir -p public/data
          cp src/data/members.json public/data/members.json
          cp src/data/changelog.json public/data/changelog.json
          npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
